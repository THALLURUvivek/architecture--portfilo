<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found - Stackly Architecture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            position: relative;
            overflow: hidden;
        }
        .error-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(196,122,86,0.08) 0%, transparent 60%),
                        radial-gradient(circle at 70% 50%, rgba(196,122,86,0.05) 0%, transparent 60%);
        }
        .error-404 {
            font-size: 10rem;
            font-weight: 900;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0;
        }
        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
        }
        .error-text {
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
            max-width: 500px;
        }
        @media (max-width: 576px) {
            .error-404 {
                font-size: 6rem;
            }
            .error-title {
                font-size: 1.4rem;
            }
            .error-text {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/image.png" alt="Stackly Architecture" height="50">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav mx-auto gap-lg-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a href="signin.html" class="btn btn-outline-light rounded-pill px-4">Sign In</a>
                    <a href="signup.html" class="btn btn-accent rounded-pill px-4">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="error-section">
        <div class="container text-center position-relative" style="z-index:2;">
            <p class="error-404">404</p>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-text mx-auto mb-4">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="index.html" class="btn btn-accent btn-lg rounded-pill px-5">Back to Home</a>
                <a href="javascript:history.back()" class="btn btn-outline-light btn-lg rounded-pill px-5">Go Back</a>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
